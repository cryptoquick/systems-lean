# Same suite as `just check` (pure flake hygiene + residual workspace gates).
name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: just check (full suite)
        run: |
          nix shell nixpkgs#just nixpkgs#scc -c "just check"
